<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360">
  <rect width="600" height="360" fill="#0b0c15"/>
  <!-- Grid lines -->
  <g stroke="#1a1a2e" stroke-width="1" opacity="0.6">
    <line x1="0" y1="20" x2="600" y2="20"/><line x1="0" y1="40" x2="600" y2="40"/>
    <line x1="0" y1="60" x2="600" y2="60"/><line x1="0" y1="80" x2="600" y2="80"/>
    <line x1="0" y1="100" x2="600" y2="100"/><line x1="0" y1="120" x2="600" y2="120"/>
    <line x1="0" y1="140" x2="600" y2="140"/><line x1="0" y1="160" x2="600" y2="160"/>
    <line x1="0" y1="180" x2="600" y2="180"/><line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="220" x2="600" y2="220"/><line x1="0" y1="240" x2="600" y2="240"/>
    <line x1="0" y1="260" x2="600" y2="260"/><line x1="0" y1="280" x2="600" y2="280"/>
    <line x1="0" y1="300" x2="600" y2="300"/><line x1="0" y1="320" x2="600" y2="320"/>
    <line x1="0" y1="340" x2="600" y2="340"/>
    <line x1="20" y1="0" x2="20" y2="360"/><line x1="40" y1="0" x2="40" y2="360"/>
    <line x1="60" y1="0" x2="60" y2="360"/><line x1="80" y1="0" x2="80" y2="360"/>
    <line x1="100" y1="0" x2="100" y2="360"/><line x1="120" y1="0" x2="120" y2="360"/>
    <line x1="140" y1="0" x2="140" y2="360"/><line x1="160" y1="0" x2="160" y2="360"/>
    <line x1="180" y1="0" x2="180" y2="360"/><line x1="200" y1="0" x2="200" y2="360"/>
    <line x1="220" y1="0" x2="220" y2="360"/><line x1="240" y1="0" x2="240" y2="360"/>
    <line x1="260" y1="0" x2="260" y2="360"/><line x1="280" y1="0" x2="280" y2="360"/>
    <line x1="300" y1="0" x2="300" y2="360"/><line x1="320" y1="0" x2="320" y2="360"/>
    <line x1="340" y1="0" x2="340" y2="360"/><line x1="360" y1="0" x2="360" y2="360"/>
    <line x1="380" y1="0" x2="380" y2="360"/><line x1="400" y1="0" x2="400" y2="360"/>
    <line x1="420" y1="0" x2="420" y2="360"/><line x1="440" y1="0" x2="440" y2="360"/>
    <line x1="460" y1="0" x2="460" y2="360"/><line x1="480" y1="0" x2="480" y2="360"/>
    <line x1="500" y1="0" x2="500" y2="360"/><line x1="520" y1="0" x2="520" y2="360"/>
    <line x1="540" y1="0" x2="540" y2="360"/><line x1="560" y1="0" x2="560" y2="360"/>
    <line x1="580" y1="0" x2="580" y2="360"/>
  </g>
  <!-- Snake body -->
  <rect x="300" y="180" width="18" height="18" fill="#ffb320" rx="3" filter="url(#glow)"/>
  <rect x="280" y="180" width="18" height="18" fill="#cc8f1a" rx="2"/>
  <rect x="260" y="180" width="18" height="18" fill="#cc8f1a" rx="2"/>
  <rect x="240" y="180" width="18" height="18" fill="#cc8f1a" rx="2"/>
  <rect x="220" y="180" width="18" height="18" fill="#cc8f1a" rx="2"/>
  <rect x="220" y="160" width="18" height="18" fill="#cc8f1a" rx="2"/>
  <rect x="220" y="140" width="18" height="18" fill="#cc8f1a" rx="2"/>
  <!-- Food -->
  <rect x="380" y="140" width="18" height="18" fill="#ff205f" rx="3"/>
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Label -->
  <text x="300" y="330" text-anchor="middle" font-family="Roboto,sans-serif" font-size="22" font-weight="800" fill="#ffb320">NEON SNAKE ARCADE</text>
  <text x="300" y="352" text-anchor="middle" font-family="Roboto,sans-serif" font-size="12" fill="#878787">Earn PlayPoints for every food collected</text>
</svg>
