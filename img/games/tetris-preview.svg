<svg xmlns="http://www.w3.org/2000/svg" width="600" height="360" viewBox="0 0 600 360">
  <rect width="600" height="360" fill="#0b0c15"/>
  <!-- Tetris board outline -->
  <rect x="200" y="10" width="200" height="300" fill="#111" stroke="#333" stroke-width="2"/>
  <!-- Placed blocks -->
  <rect x="200" y="280" width="25" height="25" fill="#ffb320" stroke="#131313" stroke-width="1"/>
  <rect x="225" y="280" width="25" height="25" fill="#ffb320" stroke="#131313" stroke-width="1"/>
  <rect x="250" y="280" width="25" height="25" fill="#ffb320" stroke="#131313" stroke-width="1"/>
  <rect x="275" y="280" width="25" height="25" fill="#ffb320" stroke="#131313" stroke-width="1"/>
  <rect x="300" y="280" width="25" height="25" fill="#ffb320" stroke="#131313" stroke-width="1"/>
  <rect x="325" y="280" width="25" height="25" fill="#ffb320" stroke="#131313" stroke-width="1"/>
  <rect x="350" y="280" width="25" height="25" fill="#ffb320" stroke="#131313" stroke-width="1"/>
  <rect x="375" y="280" width="25" height="25" fill="#ffb320" stroke="#131313" stroke-width="1"/>
  <rect x="200" y="255" width="25" height="25" fill="#694eae" stroke="#131313" stroke-width="1"/>
  <rect x="225" y="255" width="25" height="25" fill="#694eae" stroke="#131313" stroke-width="1"/>
  <rect x="250" y="255" width="25" height="25" fill="#694eae" stroke="#131313" stroke-width="1"/>
  <rect x="275" y="255" width="25" height="25" fill="#4eae60" stroke="#131313" stroke-width="1"/>
  <rect x="300" y="255" width="25" height="25" fill="#4eae60" stroke="#131313" stroke-width="1"/>
  <rect x="325" y="255" width="25" height="25" fill="#694eae" stroke="#131313" stroke-width="1"/>
  <rect x="350" y="255" width="25" height="25" fill="#694eae" stroke="#131313" stroke-width="1"/>
  <rect x="375" y="255" width="25" height="25" fill="#694eae" stroke="#131313" stroke-width="1"/>
  <rect x="200" y="230" width="25" height="25" fill="#40abf5" stroke="#131313" stroke-width="1"/>
  <rect x="225" y="230" width="25" height="25" fill="#40abf5" stroke="#131313" stroke-width="1"/>
  <rect x="250" y="230" width="25" height="25" fill="#ff205f" stroke="#131313" stroke-width="1"/>
  <rect x="275" y="230" width="25" height="25" fill="#ff205f" stroke="#131313" stroke-width="1"/>
  <rect x="300" y="230" width="25" height="25" fill="#40abf5" stroke="#131313" stroke-width="1"/>
  <rect x="325" y="230" width="25" height="25" fill="#40abf5" stroke="#131313" stroke-width="1"/>
  <!-- Falling I-piece -->
  <rect x="275" y="60" width="25" height="25" fill="#40abf5" stroke="#131313" stroke-width="1" opacity="0.9"/>
  <rect x="275" y="85" width="25" height="25" fill="#40abf5" stroke="#131313" stroke-width="1" opacity="0.9"/>
  <rect x="275" y="110" width="25" height="25" fill="#40abf5" stroke="#131313" stroke-width="1" opacity="0.9"/>
  <rect x="275" y="135" width="25" height="25" fill="#40abf5" stroke="#131313" stroke-width="1" opacity="0.9"/>
  <!-- Score panel -->
  <rect x="420" y="10" width="130" height="120" fill="#1c1c1c" stroke="#ffb320" stroke-width="1"/>
  <text x="485" y="35" text-anchor="middle" font-family="Roboto,sans-serif" font-size="11" fill="#878787" font-weight="600">SCORE</text>
  <text x="485" y="60" text-anchor="middle" font-family="Roboto,sans-serif" font-size="24" fill="#ffb320" font-weight="800">1480</text>
  <text x="485" y="85" text-anchor="middle" font-family="Roboto,sans-serif" font-size="11" fill="#878787" font-weight="600">LEVEL</text>
  <text x="485" y="110" text-anchor="middle" font-family="Roboto,sans-serif" font-size="24" fill="#fff" font-weight="800">3</text>
  <!-- Label -->
  <text x="300" y="330" text-anchor="middle" font-family="Roboto,sans-serif" font-size="22" font-weight="800" fill="#ffb320">TETRIS BLITZ</text>
  <text x="300" y="352" text-anchor="middle" font-family="Roboto,sans-serif" font-size="12" fill="#878787">Clear lines to earn PlayPoints</text>
</svg>
